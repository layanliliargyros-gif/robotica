 <style>
        /* RESET BÁSICO */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #156900;
    color: #000;
    font-size: 16px;
    line-height: 1.5;
}

/* HEADER */
header {
    background-color: #fff;
    padding: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

header .logo img {
    width: 130px;
}

/* MENU MOBILE BTN */
header .menu-btn {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
}

header .menu-btn div {
    width: 25px;
    height: 3px;
    background-color: #c4c4c4;
    transition: 0.3s;
}

/* NAV */
nav {
    display: flex;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    position: relative;
}

nav ul li a {
    color: #0a7900;
    text-decoration: none;
    font-size: 18px;
    padding: 10px 15px;
    display: block;
    border-radius: 4px;
    transition: transform 0.3s ease, color 0.3s ease;
}

/* hover mais suave */
nav ul li a:hover {
    transform: scale(1.08);
}

/* underline animado */
nav ul li a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 2px;
    background-color: #064200;
    transition: width 0.3s ease;
}

nav ul li a:hover::after,
nav ul li.active a::after {
    width: 100%;
}

/* GALLERY */
.gallery-title {
    text-align: center;
    margin: 40px 0;
    font-size: 3rem;
    color: #000;
    text-transform: uppercase;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.gallery img {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    object-fit: cover;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(6, 71, 0, 0.3);
}

/* RESPONSIVO */
@media (max-width: 768px) {

    header .logo img {
        width: 80px;
    }

    header .menu-btn {
        display: flex;
    }

    nav {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #fff;
        padding: 20px 0;
        align-items: center;
    }

    nav.active {
        display: flex;
    }

    nav ul {
        flex-direction: column;
        width: 100%;
        text-align: center;
        gap: 10px;
    }

    nav ul li a {
        font-size: 16px;
        padding: 10px;
    }
}
